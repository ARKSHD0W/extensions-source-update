name: Build Zonatmo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Zonatmo
        run: ./gradlew :src:es:zonatmoto:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zonatmoto-apk
          path: src/es/zonatmoto/build/outputs/apk/release/*.apk
      
